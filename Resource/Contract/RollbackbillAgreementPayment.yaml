openapi: 3.0.0
info:
  title: Rollback Bill Agreement Payment API
  version: 1.0.0
  description: API para procesar reversos de pagos de acuerdos de facturación

servers:
  - url: https://api.example.com/v1

paths:
  /rollback:
    post:
      summary: Procesar reverso de pago
      description: Revierte una transacción de pago de acuerdo de facturación
      operationId: rollbackPayment
      tags:
        - Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackPaymentRequest'
      responses:
        200:
          description: Reverso procesado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RollbackPaymentResponse'
        400:
          description: Solicitud inválida
        500:
          description: Error del servidor

components:
  schemas:
    trace:
      type: object
      required:
        - X-RqUID
        - X-ClientDt
        - X-GovIssueIdentType
        - X-Version
        - X-BranchName
        - X-IPAddr
        - X-KeyAcctId
      properties:
        X-RqUID:
          type: string
          minLength: 1
          maxLength: 30
          description: Identificador único de la transacción
          example: "16012019000"
        X-ClientDt:
          type: string
          format: date-time
          description: Fecha y hora del cliente en formato DateTime
          example: "2025-01-15T10:30:00Z"
        X-GovIssueIdentType:
          type: string
          minLength: 1
          maxLength: 10
          description: Tipo de identificación gubernamental
          example: "CC"
        X-Version:
          type: string
          minLength: 1
          maxLength: 10
          description: Versión de la aplicación cliente
          example: "1.0.0"
        X-BranchName:
          type: string
          minLength: 1
          maxLength: 50
          description: Nombre de la terminal o sucursal origen
          example: "W010956GZQ27"
        X-IPAddr:
          type: string
          minLength: 1
          maxLength: 50
          description: Dirección IP origen de la transacción
          example: "192.10.20.123"
        X-KeyAcctId:
          type: string
          minLength: 1
          maxLength: 20
          description: Identificador de cuenta clave interno
          example: "2"

    InvoiceInfo:
      type: object
      required:
        - Amt
        - AgrmId
        - SvcId
      properties:
        Amt:
          type: number
          minLength: 1
          maxLength: 20
          description: Valor total por pagar
          format: double
          example: 5000.0
        AgrmId:
          type: string
          minLength: 1
          maxLength: 20
          description: Identificador del acuerdo de facturación
          example: "AGRM001"
        SvcId:
          type: string
          minLength: 1
          maxLength: 4
          description: Identificador del servicio
          example: "SVC1"

    CustId:
      type: object
      required:
        - CustIdentType
        - CustIdentNum
      properties:
        CustIdentType:
          type: string
          minLength: 1
          maxLength: 2
          description: Tipo de identificación del cliente
          example: "CC"
        CustIdentNum:
          type: string
          minLength: 1
          maxLength: 20
          description: Número de identificación del cliente
          example: "12345678"

    PersonInfo:
      type: object
      required:
        - FirstName
        - LastName
      properties:
        FirstName:
          type: string
          minLength: 1
          maxLength: 50
          description: Primer nombre de la persona
          example: "Juan"
        LastName:
          type: string
          minLength: 1
          maxLength: 50
          description: Apellido de la persona
          example: "Pérez"
        MiddleName:
          type: string
          minLength: 1
          maxLength: 50
          description: Segundo nombre de la persona (opcional)
          example: "Carlos"

    RollbackPaymentRequest:
      type: object
      required:
        - trace
        - InvoiceInfo
        - CustId
        - PersonInfo
      properties:
        trace:
          $ref: '#/components/schemas/trace'
        InvoiceInfo:
          $ref: '#/components/schemas/InvoiceInfo'
        CustId:
          $ref: '#/components/schemas/CustId'
        PersonInfo:
          $ref: '#/components/schemas/PersonInfo'
        Reason:
          type: string
          minLength: 1
          maxLength: 500
          description: Razón del reverso
          example: "Cliente solicitó cancelación"

    RollbackPaymentResponse:
      type: object
      required:
        - TransactionId
        - Status
        - Message
      properties:
        TransactionId:
          type: string
          minLength: 1
          maxLength: 50
          description: ID de la transacción de reverso
          example: "TXN20250115001"
        Status:
          type: string
          minLength: 1
          maxLength: 20
          description: Estado de la transacción
          example: "SUCCESS"
        Message:
          type: string
          minLength: 1
          maxLength: 500
          description: Mensaje descriptivo del resultado
          example: "Reverso procesado exitosamente"
        RollbackAmount:
          type: number
          minLength: 1
          maxLength: 20
          description: Monto revertido
          format: double
          example: 5000.0
        ProcessedDateTime:
          type: string
          format: date-time
          description: Fecha y hora de procesamiento
          example: "2025-01-15T10:35:00Z"
