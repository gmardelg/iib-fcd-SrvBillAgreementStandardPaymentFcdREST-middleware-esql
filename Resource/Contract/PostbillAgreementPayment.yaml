openapi: 3.0.0
info:
  title: SrvCreateContactAccountAST
  description: Esta API permite la creación de un contacto en la agenda de AST para transferencias.
  contact:
    email: notificacionESB@bancopopular.com.co
  version: 1.0.0
servers:
- url: /customerManagement/v1/Affiliation
paths:
  /CreateContact:
    post:
      tags:
      - CreateContact
      summary: Crea un contacto en la agenda de AST para transferencias
      description: Crea un contacto en la agenda de AST para transferencias
      operationId: postCreateContactAccount
      parameters:
      - name: X-RqUID
        in: header
        description: Identificador unico del mensaje
        required: true
        schema:
          maxLength: 36
          minLength: 1
          type: string
        example: "201901160925"
      - name: X-Channel
        in: header
        description: Canal origen de consumo de la transaccion
        required: true
        schema:
          maxLength: 20
          minLength: 0
          type: string
          enum:
          - BM
          - PB          
        example: BM
      - name: X-CompanyId
        in: header
        description: Codigo de empresa que realiza la invocacion
        required: true
        schema:
          maximum: 10
          minimum: 0
          type: integer
          format: int32
        example: "0002"
      - name: X-IPAddr
        in: header
        description: Ip de dispositivo
        required: false
        schema:
          maxLength: 15
          minLength: 0
          type: string
          format: ipv4
        example: 179.1.89.18
      - name: X-Language
        in: header
        description: "especifica lenguaje usado, sigue el estandar ISO 639 mas un\
          \ guion mas el codigo de pais segun la norma ISO 3166"
        schema:
          maxLength: 5
          minLength: 5
          type: string
        example: es-CO
      - name: X-ClientDt
        in: header
        description: Fecha de transacción - AAAA-MM-DDThh:mm:ss
        required: false
        schema:
          type: string
          format: date-time
        example: 2024-08-09T20:00:00
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactAccountRequest'
        required: true
      responses:
        "201":
          description: Transaccion Exitosa
          headers:
            X-ApprovalId:
              description: Numero de autorizacion de la transaccion.
              schema:
                type: string
            X-RqUID:
              description: Identificador unico de la invocacion.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateContactAccountResponse'
        "206":
          description: Error en la transaccion
          headers:
            X-ApprovalId:
              description: Numero de autorizacion de la transaccion.
              schema:
                type: string
            X-RqUID:
              description: Identificador unico de la invocacion.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateContactAccountResponseBusinessError'
        "400":
          description: Peticion incorrecta
          headers:
            X-ApprovalId:
              description: Numero de autorizacion de la transaccion.
              schema:
                type: string
            X-RqUID:
              description: Identificador unico de la invocacion.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateContactAccountResponseError'
        "500":
          description: Ha ocurrido un error en la invocacion
          headers:
            X-ApprovalId:
              description: Numero de autorizacion de la transaccion.
              schema:
                type: string
            X-RqUID:
              description: Identificador unico de la invocacion.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateContactAccountResponseError'
        "504":
          description: Timeout
          headers:
            X-ApprovalId:
              description: Numero de autorizacion de la transaccion.
              schema:
                type: string
            X-RqUID:
              description: Identificador unico de la invocacion.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateContactAccountResponseError'
        "412":
          description: RqUID es requerido
          headers:
            X-ApprovalId:
              description: Numero de autorizacion de la transaccion.
              schema:
                type: string
            X-RqUID:
              description: Identificador unico de la invocacion.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateContactAccountResponseError'
        "408":
          description: Timeout del backend
          headers:
            X-ApprovalId:
              description: Numero de autorizacion de la transaccion.
              schema:
                type: string
            X-RqUID:
              description: Identificador unico de la invocacion.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateContactAccountResponseError'
        "420":
          description: Error en el backend
          headers:
            X-ApprovalId:
              description: Numero de autorizacion de la transaccion.
              schema:
                type: string
            X-RqUID:
              description: Identificador unico de la invocacion.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateContactAccountResponseError'
components:
  schemas:
    CreateContactAccountRequest:
      type: object
      properties:
        DepAcctIdFrom:
          $ref: '#/components/schemas/DepAcctIdFrom'
        ContactInfo:
          $ref: '#/components/schemas/ContactInfo'
    CreateContactAccountResponse:
      type: object
      properties:
        MsgRsHdr:
          $ref: '#/components/schemas/MsgRsHdr'
        ContactInfo:
          $ref: '#/components/schemas/ContactInfo'
    CreateContactAccountResponseBusinessError:
      type: object
      properties:
        MsgRsHdr:
          $ref: '#/components/schemas/MsgRsHdr'
    CreateContactAccountResponseError:
      type: object
      properties:
        MsgRsHdr:
          $ref: '#/components/schemas/MsgRsHdr'
    MsgRsHdr:
      required:
      - Status
      type: object
      properties:
        Status:
          $ref: '#/components/schemas/Status'
    Status:
      required:
      - Severity
      - StatusCode
      type: object
      properties:
        StatusCode:
          maximum: 99999
          minimum: 0
          type: integer
          description: Codigo de respuesta
        ServerStatusCode:
          maximum: 10
          minimum: 0
          type: integer
          description: Codigo de respuesta del servidor
        Severity:
          type: string
          description: Codigo de severidad de la respuesta
          enum:
          - Info
          - Warning
          - Error
        StatusDesc:
          maxLength: 100
          minLength: 0
          type: string
          description: Explicacion asociada al statusCode
        AdditionalStatus:
          $ref: '#/components/schemas/AdditionalStatus'
        EndDt:
          type: string
          description: "Indica fecha de finalizacion, terminacion, etc."
          format: date-time
    AdditionalStatus:
      type: object
      properties:
        StatusCode:
          maximum: 99999
          minimum: 0
          type: integer
          description: Codigo de respuesta
        ServerStatusCode:
          maximum: 10
          minimum: 0
          type: integer
          description: Codigo de respuesta del servidor
        Severity:
          type: string
          description: Codigo de severidad de la respuesta
          enum:
          - Info
          - Warning
          - Error
        StatusDesc:
          maxLength: 100
          minLength: 0
          type: string
          description: Explicacion asociada al statusCode
    DepAcctIdFrom:
      type: object
      properties:
        DepAcctId:
          $ref: '#/components/schemas/DepAcctId'
    DepAcctId:
      required:
      - AcctId
      - AcctType
      type: object
      properties:
        AcctId:
          maxLength: 25
          minLength: 0
          type: string
          description: Identificador de una cuenta
        AcctType:
          type: string
          description: "Tipo de cuenta AHO: Ahorros COR: Corriente DPE: Depósito electrónico"
          enum:
          - AHO
          - COR
          - DPE
        BankInfo:
          $ref: '#/components/schemas/BankInfo'
    DepAcctIdTo:
      type: object
      properties:
        DepAcctId:
          $ref: '#/components/schemas/DepAcctId'
    ContactInfo:
      type: object
      properties:
        ContactId:
          type: integer
          description: Identificador del contacto dentro de la agenda
        ContactName:
          type: string
          description: Nombre del contacto
        NickName:
          type: string
          description: Alias del contacto
        GovIssueIdent:
          $ref: '#/components/schemas/GovIssueIdent'
        DepAcctIdTo:
          $ref: '#/components/schemas/DepAcctIdTo'
        Favorite:
          type: boolean
          description: Indica si se marca como favorita o no
    BankInfo:
      type: object
      properties:
        BankId:
          type: string
          description: Código del banco destino.
          example: "2"
        Name:
          type: string
          description: Nombre del banco destino.
        BranchId:
          type: string
          description: Código de la oficina del banco origen.
      required:
      - BankId
    GovIssueIdent:
      type: object
      properties:
        GovIssueIdentType:
          type: string
          description: "Tipo de identificacion emitida por el gobierno del pais *CC\
          \ - Cedula de ciudadania *CE: Cedula extrangeria \
          \ *NIT_NAT: NIT Persona Natural *NIT_JUR: NIT Persona Juridica *PAS: Pasaporte *RC: Registro civil *TI: Tarjeta de\
          \ identidad *FD: Fideicomiso"        
          enum:
          - CC
          - CE
          - NIT_NAT
          - NIT_JUR
          - PAS
          - RC
          - TI
          - FD          
        IdentSerialNum:
          type: string
