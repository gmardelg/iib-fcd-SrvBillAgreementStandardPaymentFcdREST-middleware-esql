openapi: 3.0.0
info:
  title: SrvAperturaCDT
  description: Permite la apertura de un Certificado de Depósito a Término (CDT).
  contact:
    email: notificacionESB@bancopopular.com.co
  version: 1.0.0
servers:
  - url: https://10.200.157.5:7859/utilityManagement/v1/AperturaCDT
paths:
  /cdt/apertura:
    post:
      tags:
        - AperturaCDT
      summary: Permite la apertura de un Certificado de Depósito a Término (CDT).
      description: Permite la apertura de un Certificado de Depósito a Término (CDT).
      operationId: postAperturaCDT
      parameters:
        - name: X-RqUID
          in: header
          description: Identificador único del mensaje
          required: true
          schema:
            type: string
            maxLength: 32
            minLength: 1
          example: '202603221200001'
        - name: X-Channel
          in: header
          description: Canal origen de consumo de la transacción
          required: true
          schema:
            type: string
            maxLength: 20
            minLength: 1
            enum:
              - BM
              - PB
          example: BM
        - name: X-CompanyId
          in: header
          description: Codigo de empresa que realiza la invocación
          required: true
          schema:
            type: string
            maxLength: 10
            minLength: 1
          example: '0002'
        - name: X-GovIssueIdentType
          in: header
          description: Tipo de identificación emitida por el gobierno del país
          required: false
          schema:
            type: string
            maxLength: 20
            minLength: 1
          example: '1'
        - name: X-IdentSerialNum
          in: header
          description: Número de identificación de la persona que realiza la invocación
          required: true
          schema:
            type: string
            maxLength: 20
            minLength: 1
          example: '340141001'
        - name: X-IPAddr
          in: header
          description: IP del dispositivo
          required: true
          schema:
            type: string
            maxLength: 15
            minLength: 1
            format: ipv4
          example: 179.1.89.18
        - name: X-SessKey
          in: header
          description: Código de sesión
          required: false
          schema:
            type: string
            maxLength: 99
            minLength: 1
          example: 65tf76t7f7td7fdo5dtyg877hijyio89
        - name: X-Version
          in: header
          description: Versión del servicio
          required: false
          schema:
            type: string
            maxLength: 20
            minLength: 1
          example: '1.0'
        - name: X-KeyAcctId
          in: header
          description: Llave de identificación de cuenta
          required: false
          schema:
            type: string
            maxLength: 15
            minLength: 1
          example: '2'
        - name: X-BankId
          in: header
          description: Identificador del banco
          required: true
          schema:
            type: string
            maxLength: 99
            minLength: 1
          example: '0002'
        - name: X-BankIdType
          in: header
          description: Jornada de la transacción
          required: true
          schema:
            type: string
            maxLength: 1
            minLength: 1
          example: '1'
        - name: X-BranchId
          in: header
          description: Identificador de la oficina
          required: true
          schema:
            type: string
            maxLength: 10
            minLength: 1
          example: '001'
        - name: X-ClientDt
          in: header
          description: Fecha de transacción (AAAA-MM-DDThh:mm:ss)
          required: true
          schema:
            type: string
            format: date-time
          example: '2026-03-22T08:00:00'
        - name: X-NextDay
          in: header
          description: Próxima fecha hábil (AAAA-MM-DDThh:mm:ss)
          required: true
          schema:
            type: string
            format: date-time
          example: '2026-03-23T08:00:00'
        - name: X-Reverse
          in: header
          description: Indicador de reverso
          required: true
          schema:
            type: boolean
          example: false
        - name: X-Language
          in: header
          description: 'Idioma (ISO 639 + guion + ISO 3166, ej: es_CO)'
          required: true
          schema:
            type: string
            maxLength: 5
            minLength: 5
          example: es_CO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AperturaCDTRequest'
      responses:
        '201':
          description: Transacción Exitosa
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponse'
        '206':
          description: Error en la transacción (negocio)
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponseBusinessError'
        '400':
          description: Petición incorrecta
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponseError'
        '404':
          description: Recurso no existe
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponseError'
        '408':
          description: Timeout del backend
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponseError'
        '412':
          description: X-RqUID es requerido
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponseError'
        '420':
          description: Error en el backend
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponseError'
        '500':
          description: Ha ocurrido un error en la invocación
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponseError'
        '501':
          description: Operación no implementada
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponseError'
        '503':
          description: Servidor no disponible
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponseError'
        '504':
          description: Timeout
          headers:
            X-ApprovalId:
              description: Número de autorización de la transacción
              schema:
                type: string
            X-RqUID:
              description: Identificador único de la invocación
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AperturaCDTResponseError'
components:
  schemas:
    AperturaCDTRequest:
      type: object
      properties:
        NumberAccount:
          type: string
          description: Número de cuenta origen
          maxLength: 20
          minLength: 1
          example: texto
        CustIdentType:
          type: string
          description: Tipo de identificación del titular
          maxLength: 15
          minLength: 1
          example: texto
        CustIdentNum:
          type: string
          description: Número de identificación del titular
          maxLength: 20
          minLength: 1
          example: texto
        ValueUvr:
          type: number
          description: Valor a invertir
          maximum: 1000000000000000000
          minimum: 0
          example: 0.0
        TermLeasingMonths:
          type: integer
          description: Plazo en meses
          maximum: 999
          minimum: 0
          example: 1
      required:
        - NumberAccount
        - CustIdentType
        - CustIdentNum
        - ValueUvr
        - TermLeasingMonths
    AperturaCDTResponse:
      type: object
      properties:
        MsgRsHdr:
          $ref: '#/components/schemas/MsgRsHdr'
        NumberCdt:
          type: string
          description: Número de CDT generado
          maxLength: 20
          minLength: 1
          example: texto
        OpenDt:
          type: string
          description: Fecha de apertura
          maxLength: 10
          minLength: 10
          format: date
          example: '2026-03-24'
        DateExpirationCdt:
          type: string
          description: Fecha de vencimiento
          maxLength: 10
          minLength: 10
          format: date
          example: '2026-03-24'
      required:
        - NumberCdt
        - OpenDt
        - DateExpirationCdt
    AperturaCDTResponseBusinessError:
      type: object
      properties:
        MsgRsHdr:
          $ref: '#/components/schemas/MsgRsHdr'
    AperturaCDTResponseError:
      type: object
      properties:
        MsgRsHdr:
          $ref: '#/components/schemas/MsgRsHdr'
    MsgRsHdr:
      type: object
      required:
        - Status
      properties:
        Status:
          $ref: '#/components/schemas/Status'
    Status:
      type: object
      required:
        - Severity
        - StatusCode
      properties:
        StatusCode:
          type: string
          maxLength: 9
          minLength: 1
          description: Código de respuesta
          example: '0'
        ServerStatusCode:
          type: string
          maxLength: 10
          minLength: 1
          description: Código de respuesta del servidor
          example: '0'
        Severity:
          type: string
          maxLength: 7
          minLength: 4
          description: Código de severidad de la respuesta
          enum:
            - Info
            - Warning
            - Error
          example: Info
        StatusDesc:
          type: string
          maxLength: 100
          minLength: 1
          description: Explicación asociada al statusCode
          example: Transacción Exitosa (o descripción del error en caso de rechazo)
        AdditionalStatus:
          $ref: '#/components/schemas/AdditionalStatus'
        EndDt:
          type: string
          format: date-time
          description: Fecha de finalización
          example: '2026-03-22T15:22:30'
    AdditionalStatus:
      type: object
      properties:
        StatusCode:
          type: string
          maxLength: 9
          minLength: 1
          description: Código de respuesta adicional
          example: '0'
        ServerStatusCode:
          type: string
          maxLength: 10
          minLength: 1
          description: Código de respuesta del servidor adicional
          example: '0'
        Severity:
          type: string
          maxLength: 7
          minLength: 4
          enum:
            - Info
            - Warning
            - Error
          example: Info
        StatusDesc:
          type: string
          maxLength: 100
          minLength: 1
          description: Explicación del status adicional
          example: Transacción Exitosa (o descripción del error en caso de rechazo)
