openapi: 3.0.0
info:
  title: Postbill Agreement Payment API
  version: 1.0.0
  description: API para procesar pagos posteriores a facturación de acuerdos

servers:
  - url: https://api.example.com/v1

paths:
  /postbill:
    post:
      summary: Procesar pago posterior a facturación
      description: Procesa un pago después de la facturación de un acuerdo
      operationId: postbillPayment
      tags:
        - Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostbillPaymentRequest'
      responses:
        200:
          description: Pago procesado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostbillPaymentResponse'
        400:
          description: Solicitud inválida
        500:
          description: Error del servidor

components:
  schemas:
    trace:
      type: object
      required:
        - X-RqUID
        - X-ClientDt
        - X-GovIssueIdentType
        - X-Version
        - X-BranchName
        - X-IPAddr
        - X-KeyAcctId
      properties:
        X-RqUID:
          type: string
          minLength: 1
          maxLength: 30
          description: Identificador único de la transacción
          example: "16012019000"
        X-ClientDt:
          type: string
          format: date-time
          description: Fecha y hora del cliente en formato DateTime
          example: "2025-01-15T10:30:00Z"
        X-GovIssueIdentType:
          type: string
          minLength: 1
          maxLength: 10
          description: Tipo de identificación gubernamental
          example: "CC"
        X-Version:
          type: string
          minLength: 1
          maxLength: 10
          description: Versión de la aplicación cliente
          example: "1.0.0"
        X-BranchName:
          type: string
          minLength: 1
          maxLength: 50
          description: Nombre de la terminal o sucursal origen
          example: "W010956GZQ27"
        X-IPAddr:
          type: string
          minLength: 1
          maxLength: 50
          description: Dirección IP origen de la transacción
          example: "192.10.20.123"
        X-KeyAcctId:
          type: string
          minLength: 1
          maxLength: 20
          description: Identificador de cuenta clave interno
          example: "2"

    InvoiceInfo:
      type: object
      required:
        - Amt
        - AgrmId
        - SvcId
      properties:
        Amt:
          type: number
          minLength: 1
          maxLength: 20
          description: Valor total del concepto a pagar
          format: double
          example: 5000.0
        AgrmId:
          type: string
          minLength: 1
          maxLength: 20
          description: Identificador del acuerdo de facturación
          example: "AGRM001"
        SvcId:
          type: string
          minLength: 1
          maxLength: 4
          description: Identificador del servicio
          example: "SVC1"
        InvoiceDate:
          type: string
          format: date
          description: Fecha de emisión de la factura
          example: "2025-01-10"
        InvoiceNumber:
          type: string
          minLength: 1
          maxLength: 50
          description: Número de factura
          example: "INV20250110001"

    CustId:
      type: object
      required:
        - CustIdentType
        - CustIdentNum
      properties:
        CustIdentType:
          type: string
          minLength: 1
          maxLength: 2
          description: Tipo de identificación del cliente
          example: "CC"
        CustIdentNum:
          type: string
          minLength: 1
          maxLength: 20
          description: Número de identificación del cliente
          example: "12345678"

    PersonInfo:
      type: object
      required:
        - FirstName
        - LastName
      properties:
        FirstName:
          type: string
          minLength: 1
          maxLength: 50
          description: Primer nombre de la persona
          example: "Juan"
        LastName:
          type: string
          minLength: 1
          maxLength: 50
          description: Apellido de la persona
          example: "Pérez"
        MiddleName:
          type: string
          minLength: 1
          maxLength: 50
          description: Segundo nombre de la persona (opcional)
          example: "Carlos"
        Email:
          type: string
          minLength: 5
          maxLength: 100
          description: Correo electrónico de la persona
          example: "juan.perez@example.com"

    PmtReferences:
      type: object
      properties:
        Reference1:
          type: string
          minLength: 1
          maxLength: 50
          description: Primera referencia de pago
          example: "REF001"
        Reference2:
          type: string
          minLength: 1
          maxLength: 50
          description: Segunda referencia de pago
          example: "REF002"
        Reference3:
          type: string
          minLength: 1
          maxLength: 50
          description: Tercera referencia de pago
          example: "REF003"
        Reference4:
          type: string
          minLength: 1
          maxLength: 50
          description: Cuarta referencia de pago
          example: "REF004"
        Reference5:
          type: string
          minLength: 1
          maxLength: 50
          description: Quinta referencia de pago
          example: "REF005"

    PostbillPaymentRequest:
      type: object
      required:
        - trace
        - InvoiceInfo
        - CustId
        - PersonInfo
      properties:
        trace:
          $ref: '#/components/schemas/trace'
        InvoiceInfo:
          $ref: '#/components/schemas/InvoiceInfo'
        CustId:
          $ref: '#/components/schemas/CustId'
        PersonInfo:
          $ref: '#/components/schemas/PersonInfo'
        PmtReferences:
          $ref: '#/components/schemas/PmtReferences'
        PaymentMethod:
          type: string
          minLength: 1
          maxLength: 50
          description: Método de pago utilizado
          example: "CREDIT_CARD"
        AuthorizationCode:
          type: string
          minLength: 1
          maxLength: 50
          description: Código de autorización del pago
          example: "AUTH20250115001"

    PostbillPaymentResponse:
      type: object
      required:
        - TransactionId
        - Status
        - Message
      properties:
        TransactionId:
          type: string
          minLength: 1
          maxLength: 50
          description: ID de la transacción de pago
          example: "TXN20250115001"
        Status:
          type: string
          minLength: 1
          maxLength: 20
          description: Estado de la transacción
          example: "SUCCESS"
        Message:
          type: string
          minLength: 1
          maxLength: 500
          description: Mensaje descriptivo del resultado
          example: "Pago procesado exitosamente"
        PaymentAmount:
          type: number
          minLength: 1
          maxLength: 20
          description: Monto pagado
          format: double
          example: 5000.0
        ConfirmationNumber:
          type: string
          minLength: 1
          maxLength: 50
          description: Número de confirmación del pago
          example: "CONF20250115001"
        ProcessedDateTime:
          type: string
          format: date-time
          description: Fecha y hora de procesamiento
          example: "2025-01-15T10:35:00Z"
        BalanceDue:
          type: number
          minLength: 1
          maxLength: 20
          description: Saldo pendiente después del pago
          format: double
          example: 0.0
